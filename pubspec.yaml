name: skin_firts
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  go_router: ^17.1.0
  flutter_svg: ^2.0.10
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_database: ^12.2.0
  firebase_storage: ^13.2.0
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.4
  local_auth: ^2.2.0
  media_query_preview: ^0.1.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^17.1.0
  intl: ^0.20.2
  file_picker: ^10.3.10
  image_picker: ^1.2.1
  shimmer: ^3.0.0
  http: ^1.6.0
  emoji_picker_flutter: ^4.4.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
      - assets/images/
      - assets/languages/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/welcome_image.png"
  remove_alpha_ios: true
